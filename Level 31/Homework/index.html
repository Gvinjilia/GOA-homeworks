<!--შექმენით ვებგვერდი რომელზეც დაამატებთ თქვენთვის სასურველ ვიდეოს და აუდიოს, ორივეს მინიმუმ 3 განსხვავებული ფორომატი, 
დაამატეთ ნასწავლი მართვის ფუნქციები (autoplay, loop, muted) თითოეული ახსენით კომენტარებით. შეასრულეთ იგივე მაგრამ გამოიყენეთ არასწორი გზა, 
ერთ მედია თეგში რამდენიმე source თეგის ნაცვლად აიღეთ რამდენიმე 
მედია თეგი და დაუწერეთ src ატრიბუტი. დაწერეთ განსხვავება, მიუთითეთ რომელია სწორი გზა და რატომ -->
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <video controls autoplay loop muted width="600">
            <source src="video.mp4" type="video/mp4">
            <source src="video.mkv" type="video/mkv">
            <source src="video.ogg" type="video/ogg">
        </video>
        <audio controls autoplay loop muted>
            <source src="audio.mp3" type="audio/mpeg">
            <source src="audio.ogg" type="audio/ogg">
            <source src="audio.wav" type="audio/wav">
<!-- ეს გზა არის ბევრად უფრო სწორი იმიტომ რომ სტრუქტურა არის დაცული არის გამოყენებული <video> <audio> 
თეგები სწორად და ასევე ბრაუზერი ირჩევს ფორმატს რომელსაც უჭერს მხარს -->
        </audio>
    </body>
</html>

<video controls autoplay loop muted width="600">
<video src="video.mp4"></video>
        <video src="video.mkv"></video>
    <video src="video.ogg"></video> 
<audio controls autoplay loop muted>
    <audio src="audio.mp3"></audio>
<audio src="audio.ogg"></audio>
<audio src="audio.wav"></audio>
