<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function sortByAge(arr, callback){
            arr.sort(callback)
        }
        const people = [
            { name: "Alice", age: 25 },
            { name: "Bob", age: 17 },
            { name: "Charlie", age: 30 }
        ];

        sortByAge(people, (a, b) => a.age - b.age);
        console.log(people)


        function applyToEach(arr, callback){
            const result = []
            for(let i = 0; i< arr.length; i++){
                result.push(callback(arr[i]))
            }
            return result
        }

        const numbers = [1, 2, 3, 4];
        const doubled = applyToEach(numbers, num => num * 2);
        console.log(doubled);

        function filterAdults(arr, callback){
            const result = []
            for(let i = 0; i < arr.length; i++){
                if(callback(arr[i])){
                    result.push(arr[i])
                }
            }
            return result
        }
        const filtered = filterAdults(people, person => person.age >= 18);
        console.log(filtered);


        function sumAges(arr, callback){
            let sum = 0;
            for(let i = 0; i < arr.length; i++){
                sum = callback(sum,arr[i])
            }
            return sum
        }

        const totalAge = sumAges(people, (sum, person) => sum + person.age, 0);
        console.log(totalAge);

        function findOldest(arr, callback){
            let oldest = arr[0];
            for (let i = 1; i< arr.length; i++){
                oldest = callback(oldest,arr[i])
            }
            return oldest
        }

        const oldest = findOldest(people, (old, person) => (person.age > old.age ? person : old));
        console.log(oldest);


        function logNames(arr, callback){
            for(let i = 0; i < arr.length; i++){
                callback(arr[i]);
            }
        }

        logNames(people, person => console.log(person.name));

        function formatPeople(arr, callback){
            const result = [];
            for(let i = 0; i< arr.length;i++){
                result.push(callback(arr[i]))
            }

            return result
        }

        const descriptions = formatPeople(people, person => `${person.name} is ${person.age} years old.`);
        console.log(descriptions);

        function findYoungest(arr, callback){
            let youngest = arr[0];
            for(let i = 0; i< arr.length;i++){
                if(arr[i] < arr[0]){
                    youngest = arr[i]
                }
            }
            return youngest
        }

        const youngest = findYoungest(people, (youngest, person) => (person.age < youngest.age ? person : youngest));
        console.log(youngest);

        function areAllAdults(arr, callback){
            for(let i = 0;i< arr.length;i++){
                if(callback(arr[i]) === false){
                    return false
                }
            }
            return true
        }
        const allAdults = areAllAdults(people, person => person.age >= 18);
        console.log(allAdults);


        function findMinor(arr, callback){
            for(let i = 0;i< arr.length;i++){
                if(callback(arr[i]) < 18){
                    return arr[i]
                }
            }
            return arr[i]
        }

        const firstMinor = findMinor(people, person => person.age < 18);
        console.log(firstMinor);


        function myMap(arr, callback){
            const resultMap = [];
            for(let i = 0;i<arr.length;i++){
                resultMap.push(callback(arr[i]))
            }
            return resultMap
        }
        const resultMap = myMap([1, 2, 3], num => num * 2);
        console.log(resultMap);


        function myFilter(arr, callback){
            const filterResult = [];
            for(let i = 0;i<arr.length;i++){
                if(callback(arr[i])){
                    filterResult.push(arr[i])
                }
            }
            return filterResult
        }

        const result2 = myFilter([1, 2, 3, 4], num => num > 2);
        console.log(result2);


        function myReduce(arr, callback, initialValue){
            let acc = initialValue;
            for(let i = 0;i< arr.length;i++){
                acc = callback(acc,arr[i])
            }
            return acc
        }

        const acc = myReduce([1, 2, 3], (acc, num) => acc + num, 0);
        console.log(acc);


        function myForEach(arr, callback){
            for(let i = 0;i<arr.length;i++){
                callback(arr[i])
            }
        }
        myForEach([1, 2, 3], num => console.log(num));


        function myFind(arr, callback){
            for(let i = 0;i<arr.length;i++){
                if(callback(arr[i])){
                    return arr[i];
                }
            }
        }
        const result = myFind([1, 2, 3, 4], num => num > 2);
        console.log(result);
    </script>
</body>
</html>
